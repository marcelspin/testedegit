<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Estudos DOM</h1>
    <p>Apreendendo DOM em javaScript</p>
    <p>Aqui será Alterado</p>     <!-- este texto e cor fui mudado pelo comando abaixo -->
    <p id="msg">Vamos usar outro <b>seletor</b></p>
    <label for="nome">Digite seu Nome</label>
    <input type="text" name="nome" id="nome">
    <button onclick="mostrarNome">Mostrar</button>
    <p id="resultado"></p>

    <script>
        let paragrafo=document.getElementsByTagName ('p')[1]
        paragrafo.innerText = "Este texto foi Mudado"
        paragrafo.style.color = "red"

        let p2 = document.getElementById('msg')
        p2.innerHTML = "Mudamos o texto usando seletor <strong> ID </strong>"

        function mostrarNome(){
            let nome = document.getElementsByName ("nome")[0].value
            document.getElementById("resultado").innerText = 'Olá, ${nome}'
        }
        
         
        
    </script>
    
</body>
</html>
